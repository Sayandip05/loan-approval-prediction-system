services:
  # FastAPI Backend
  api:
    build:
      context: .
      target: api
    container_name: loan-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./metrics.json:/app/metrics.json
    networks:
      - loan-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  frontend:
    build:
      context: .
      target: frontend
    container_name: loan-frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - loan-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  loan-network:
    driver: bridge
